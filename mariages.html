<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="ENCORE propose des véhicules de collection pour mariages d'exception, arrivées VIP, cortèges et shootings couple."
    >
    <title>Mariages - ENCORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Playfair+Display:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="mariages-page" data-page="mariages">
    <div data-include="partials/header-mariages.html"></div>

    <main class="mariages-page-main" id="mariages">
      <section class="mariages-hero" aria-labelledby="mariages-title">
        <div class="mariages-hero-picture" aria-hidden="true"></div>
        <div class="mariages-hero-wash" aria-hidden="true"></div>
        <div class="mariages-hero-content">
          <h1 id="mariages-title">Mariages<br>d'exception</h1>
          <p class="mariages-hero-subtitle">Des arrivées qui<br>marquent les esprits.</p>
          <div class="mariages-ornament" aria-hidden="true"><span></span></div>
          <p class="mariages-hero-copy">
            Chaque mariage raconte une histoire.<br>
            Certains méritent une légende.
          </p>
          <div class="mariages-hero-actions">
            <a class="mariages-btn mariages-btn-primary" href="#vehicules-mariage">Découvrir nos véhicules</a>
            <a class="mariages-btn mariages-btn-ghost" href="#devis-mariage">Demander un devis</a>
          </div>
        </div>
      </section>

      <img
        class="mariages-page-artboard"
        src="assets/mariages-page/mariages-content.png"
        alt="Arrivées VIP, shooting photo, cortèges, expériences exclusives, véhicules mariage, inspirations et formulaire de devis"
      >
      <span id="vehicules-mariage" class="page-anchor" aria-hidden="true"></span>
      <span id="devis-mariage" class="page-anchor" aria-hidden="true"></span>
    </main>

    <script src="script.js"></script>
  </body>
</html>
